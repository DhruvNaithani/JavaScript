<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock_paper_scissors</title>
</head>
<body>
    <p>Rock Paper Scissors</p>
    <button onclick="
    const random=Math.random();
    let cmove='';
    let result='';
    if(random>=0 && random<(1/3)){
        cmove='rock';
    }
    else if(random>=(1/3) && random<(2/3)){
        cmove='paper';
    }
    else{
        cmove='scissors';
    }
    if(cmove === 'rock'){
        result='tie';
    }
    else if(cmove==='paper'){
        result='you lose';
    }
    else{
        result='you win';
    }
    alert(`You picked rock,Computer picked ${cmove}.${result}`);
    ">
    Rock</button>
    <button onclick="
    const random2=Math.random();
    let cmove2='';
    let result2='';
    if(random2>=0 && random2<(1/3)){
        cmove2='rock';
    }
    else if(random2>=(1/3) && random2<(2/3)){
        cmove2='paper';
    }
    else{
        cmove2='scissors';
    }
    if(cmove2 === 'rock'){
        result2='you win';
    }
    else if(cmove2==='paper'){
        result2='tie';
    }
    else{
        result2='you lose';
    }
    alert(`You picked paper,Computer picked ${cmove2}.${result2}`);"
    >
    Paper</button>
    <button
    onclick="const random3=Math.random();
    let cmove3='';
    let result3='';
    if(random3>=0 && random3<(1/3)){
        cmove3='rock';
    }
    else if(random3>=(1/3) && random3<(2/3)){
        cmove3='paper';
    }
    else{
        cmove3='scissors';
    }
    if(cmove3 === 'rock'){
        result3='you lose';
    }
    else if(cmove3==='paper'){
        result3='you win';
    }
    else{
        result3='tie';
    }
    alert(`You picked scissors,Computer picked ${cmove3}.${result3}`);"
    >
    Scissors</button>
    <script>
        alert('welcome to the game');
    </script>
</body>
</html>
