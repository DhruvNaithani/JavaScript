<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>functions</title>
</head>
<body>
    <button onclick="greet()">Hello</button>
    <a href="#" onclick="greet2(',how are you')">click here</a>
    <br>
    <br>
    <button onclick="
    let len=parseFloat(prompt('enter length'));
    let from=prompt('enter from');
    let to=prompt('enter to');
    convertToLength(len,from,to)">Converter</button>
    <script>
        function greet(){
            console.log('hello');
        }
        function greet2(name){
            if(name===undefined){
                console.log('hi there!');
            }
            else{ console.log(`hello ${name}`);}
        }
        let result;
        function convertToLength(length,from,to){
            if(from==='miles' && to==='km'){
                result=(length*1.6);
                console.log(`${result} km`);
            }
            else if(from==='km' && to==='miles'){
                result=(length/1.6);
                console.log(`${result} miles`);
            }
            else  if(from==='miles' && to==='ft'){
                result=(length*5280);
                console.log(`${result} ft`);
            }
            else if(from==='ft' && to==='miles'){
                result=(length/5280);
                console.log(`${result} miles`);
            }
            else if(from==='km' && to==='ft'){
                result=(length*3281);
                console.log(`${result} ft`);
            }
            else if(from==='ft' && to==='km'){
                result=(length/3281);
                console.log(`${result} km`);
            }
            else{
                if(from!='km'&&from!='miles'&&from!='ft'){
                    console.log(`invalid unit:${from}`);}
                else{
                    console.log(`invalid units:${to}`);
                }
            }
        }
    </script>
</body>
</html>
