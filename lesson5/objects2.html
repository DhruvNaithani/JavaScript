<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock_paper_scissors</title>
</head>
<body>
    <p>Rock Paper Scissors</p>
    <button onclick="
    const random=Math.random();
    let cmove='';
    let result='';
    if(random>=0 && random<(1/3)){
        cmove='rock';
    }
    else if(random>=(1/3) && random<(2/3)){
        cmove='paper';
    }
    else{
        cmove='scissors';
    }
    if(cmove === 'rock'){
        result='tie';
    }
    else if(cmove==='paper'){
        result='you lose';
    }
    else{
        result='you win';
    }
    if(result==='you win'){
        score.win++;
    }
    else if(result==='you lose'){
        score.lose++;
    }
    else{
        score.tie++;
    }
     localStorage.setItem('score',JSON.stringify(score));
    alert(`You picked rock,Computer picked ${cmove}.${result}.\nThe score is win:${score.win},lose:${score.lose},tie:${score.tie}`);
    ">
    Rock</button>
