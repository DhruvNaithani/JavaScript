<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Head Tail</title>
</head>
<body>
    <button onclick="headChoice()">Head</button>
    <button onclick="tailChoice()">Tail</button>
    <button onclick="
    score.win=0;
    score.lose=0;
    localStorage.removeItem('score');
    ">Reset Button</button>
    <script>
        let result;
        
        let score=JSON.parse(localStorage.getItem('score'))||{
            win:0,
            lose:0
        };
        function headChoice(){
            let choice=Math.random();
            if(choice>=1/2){
                result='head';
            }
            else if(choice<1/2){
                result='tails';
            }
            if(result==='tails'){
                score.lose++;
            }
            else if(result==='head'){
                score.win++;
            }
            localStorage.setItem('score',JSON.stringify(score));
            alert(`The score is\nWin:${score.win}|Lose:${score.lose}`);

        };
        function tailChoice(){
            let choice=Math.random();
            if(choice>=1/2){
                result='head';
            }
            else if(choice<1/2){
                result='tails';
            }
            if(result==='tails'){
                score.win++;
            }
            else if(result==='head'){
                score.lose++;
            }
            localStorage.setItem('score',JSON.stringify(score));
            alert(`The score is\nWin:${score.win}|Lose:${score.lose}`);

        };

    </script>
</body>
</html>
