<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>objects</title>
</head>
<body>
    <button onclick="compare(product1,product2)">compare</button>
    <script>
        const product1={
            name:'socks',
            price:1050
        };
        const product2={
            name:'football',
            price:1000
        };
        function compare(productA,productB){
            if(productA.price>productB.price){
                console.log(productA.price);
            }
            else{
                console.log(productB.price);
            }
        };
    </script>
</body>
</html>
