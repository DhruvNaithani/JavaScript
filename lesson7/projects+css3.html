<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <style>
        body{
            background-color:black;
            color:white;
            font-family: Arial, Helvetica, sans-serif;
        }
        .tittle{
            font-size:30px;
            font-weight:bold;
        }
        .move-icon{
            height:50px;
        }
        .move-btn{
            background-color:transparent;
            border:3px solid white;
            width:120px;
            height:120px;
            border-radius:50%; 
            margin-right:10px;
        }
        .js-result{
            font-size: 25px;
            font-weight:bolder;
            margin-top:50px;

        }
        .score{
            margin-top:60px;
        }
        .reset{
            background-color: white;
            border:1px solid white;
            padding:5px 8px;
            font-weight:bolder;
            font-size:15px;
            margin-top:20px
        }
    </style>
  </head>
  <body>
    <p class="tittle">Rock Paper Scissors</p>
    <button onclick="
      playGame('rock');
    "
    class="move-btn"
    ><img src="rock-emoji.png" class="move-icon"></button>

    <button onclick="
      playGame('paper');
    "
    class="move-btn"
    ><img src="paper-emoji.png" class="move-icon"></button>

    <button onclick="
      playGame('scissors');
    "
    class="move-btn"
    ><img src="scissors-emoji.png" class="move-icon"></button>
    <p class="js-result"></p>
    <p class="js-move">

    </p>
    
    <p class="js-score score "></p>
    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
    " class="reset">Reset Score</button>

    <script>
      let score = JSON.parse(localStorage.getItem('score')) || {
        wins: 0,
        losses: 0,
        ties: 0
      };

      function updateScore(){
            return document.querySelector('.js-score').innerHTML=`Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
       
      };

      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = '';

        if (playerMove === 'scissors') {
          if (computerMove === 'rock') {
            result = 'You lose.';
          } else if (computerMove === 'paper') {
            result = 'You win.';
          } else if (computerMove === 'scissors') {
            result = 'Tie.';
          }

        } else if (playerMove === 'paper') {
          if (computerMove === 'rock') {
            result = 'You win.';
          } else if (computerMove === 'paper') {
            result = 'Tie.';
          } else if (computerMove === 'scissors') {
            result = 'You lose.';
          }
          
        } else if (playerMove === 'rock') {
          if (computerMove === 'rock') {
            result = 'Tie.';
          } else if (computerMove === 'paper') {
            result = 'You lose.';
          } else if (computerMove === 'scissors') {
            result = 'You win.';
          }
        }

        if (result === 'You win.') {
          score.wins += 1;
        } else if (result === 'You lose.') {
          score.losses += 1;
        } else if (result === 'Tie.') {
          score.ties += 1;
        }

        localStorage.setItem('score', JSON.stringify(score));
        updateScore();
        document.querySelector('.js-result').innerHTML=result;
        document.querySelector('.js-move').innerHTML=`you <img src ="${playerMove}-emoji.png" class="move-icon"> <img src="${computerMove}-emoji.png" class="move-icon"> Computer`;

//         alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}
// Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);
//       
}

      function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'paper';
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = 'scissors';
        }
        
         return computerMove;
      };
      
      
    </script>
  </body>
</html>
